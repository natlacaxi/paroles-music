<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic-Frequency — Paroles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08080f;
  --v1: #7c6fff;
  --v2: #d47cff;
  --v3: #5ee7ff;
  --v4: #5fffc8;
  --text: #eeeeff;
  --text2: #9898c0;
  --muted: #5050a0;
  --glass: rgba(255,255,255,0.07);
  --glass2: rgba(255,255,255,0.12);
  --gb: rgba(255,255,255,0.18);
  --blur: blur(28px) saturate(1.8);
  --red: #ff6b6b;
}
[data-theme="light"] {
  --bg: #e8e8f8;
  --v1: #6a5af0;
  --v2: #b060e0;
  --v3: #1ab8d8;
  --v4: #18c888;
  --text: #18183a;
  --text2: #5050a0;
  --muted: #9090b8;
  --glass: rgba(255,255,255,0.5);
  --glass2: rgba(255,255,255,0.7);
  --gb: rgba(255,255,255,0.8);
  --blur: blur(28px) saturate(2);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background .4s, color .4s;
}

/* BG ORBS */
.orb {
  position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
  filter: blur(80px); opacity: .28;
  animation: orbFloat 12s ease-in-out infinite;
}
.orb1 { width: 600px; height: 600px; background: radial-gradient(circle, #7c6fff 0%, transparent 70%); top: -200px; left: -150px; animation-delay: 0s; }
.orb2 { width: 500px; height: 500px; background: radial-gradient(circle, #d47cff 0%, transparent 70%); top: 30%; right: -180px; animation-delay: -4s; }
.orb3 { width: 400px; height: 400px; background: radial-gradient(circle, #5ee7ff 0%, transparent 70%); bottom: -120px; left: 30%; animation-delay: -8s; }
[data-theme="light"] .orb { opacity: .12; }
@keyframes orbFloat {
  0%,100% { transform: translate(0,0) scale(1); }
  33% { transform: translate(30px,-40px) scale(1.08); }
  66% { transform: translate(-20px,30px) scale(.94); }
}

/* LAYOUT */
#app { position: relative; z-index: 2; max-width: 960px; margin: 0 auto; padding: 52px 28px 100px; }

/* HEADER */
.header { margin-bottom: 36px; }
.brand {
  font-family: 'Syne', sans-serif; font-size: 42px; font-weight: 800; letter-spacing: -.04em;
  background: linear-gradient(135deg, var(--v1) 0%, var(--v2) 45%, var(--v3) 90%);
  background-size: 300% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; animation: gradMove 5s ease infinite; line-height: 1.1;
}
.brand-sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .3em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
@keyframes gradMove { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

/* SEARCH BAR */
.search-wrap { position: relative; margin-bottom: 20px; }
.search-wrap input {
  width: 100%; padding: 18px 56px 18px 56px;
  background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--gb); border-radius: 20px;
  color: var(--text); font-family: 'Outfit', sans-serif; font-size: 16px; outline: none;
  transition: all .25s;
  box-shadow: 0 8px 32px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.12);
}
.search-wrap input:focus {
  border-color: var(--v1); background: rgba(124,111,255,.12);
  box-shadow: 0 0 0 4px rgba(124,111,255,.18), 0 8px 32px rgba(124,111,255,.12), inset 0 1px 0 rgba(255,255,255,.15);
}
.search-wrap input::placeholder { color: var(--muted); }
.si { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); font-size: 18px; pointer-events: none; }
.sc { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px; display: none; transition: color .15s; }
.sc:hover { color: var(--red); }

/* FILTER PILLS */
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 22px; }
.fpill {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
  padding: 7px 18px; border-radius: 20px;
  background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,.14);
  color: var(--text2); cursor: pointer; transition: all .2s; white-space: nowrap;
}
.fpill:hover { border-color: var(--v1); color: var(--v1); background: rgba(124,111,255,.12); }
.fpill.active {
  border-color: var(--v1); background: linear-gradient(135deg, rgba(124,111,255,.22), rgba(212,124,255,.14));
  color: var(--v1); box-shadow: 0 0 0 3px rgba(124,111,255,.18);
}

/* COUNT */
.count-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.count-txt { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: .12em; }

/* TRACK LIST */
.list { display: flex; flex-direction: column; gap: 10px; }
.track-card {
  background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border: 1px solid rgba(255,255,255,.12); border-radius: 18px;
  overflow: hidden; transition: border-color .2s, box-shadow .2s;
  box-shadow: 0 4px 20px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.08);
  animation: fadeIn .3s ease both;
}
.track-card:hover { border-color: rgba(124,111,255,.4); box-shadow: 0 8px 32px rgba(124,111,255,.15), inset 0 1px 0 rgba(255,255,255,.1); }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.track-header {
  display: flex; align-items: center; gap: 14px; padding: 16px 20px; cursor: pointer;
  user-select: none;
}
.track-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); width: 28px; flex-shrink: 0; }
.track-emoji { font-size: 22px; flex-shrink: 0; }
.track-info { flex: 1; min-width: 0; }
.track-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-artist { font-size: 12px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-meta { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.genre-tag {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .06em;
  padding: 3px 10px; border-radius: 10px; border: 1px solid; backdrop-filter: blur(8px);
}
.g-pop  { background: rgba(124,111,255,.1); color: #a78bfa; border-color: rgba(124,111,255,.3); }
.g-rnb  { background: rgba(212,124,255,.1); color: #d47cff; border-color: rgba(212,124,255,.3); }
.g-rap  { background: rgba(94,231,255,.1);  color: #5ee7ff; border-color: rgba(94,231,255,.3); }
.g-rock { background: rgba(255,126,179,.1); color: #ff7eb3; border-color: rgba(255,126,179,.3); }
.g-elec { background: rgba(95,255,200,.1);  color: #5fffc8; border-color: rgba(95,255,200,.3); }
.g-soul { background: rgba(255,179,71,.1);  color: #ffb347; border-color: rgba(255,179,71,.3); }
.g-var  { background: rgba(200,204,232,.1); color: #c8cce8; border-color: rgba(200,204,232,.25); }
[data-theme="light"] .g-pop  { background: rgba(106,90,240,.1); color: #6a5af0; border-color: rgba(106,90,240,.3); }
[data-theme="light"] .g-rnb  { background: rgba(176,96,224,.1); color: #b060e0; border-color: rgba(176,96,224,.3); }
[data-theme="light"] .g-rap  { background: rgba(26,184,216,.1); color: #1ab8d8; border-color: rgba(26,184,216,.3); }
[data-theme="light"] .g-rock { background: rgba(224,80,144,.1); color: #e05090; border-color: rgba(224,80,144,.3); }
[data-theme="light"] .g-elec { background: rgba(24,200,136,.1); color: #18c888; border-color: rgba(24,200,136,.3); }
[data-theme="light"] .g-soul { background: rgba(200,128,16,.1); color: #c88010; border-color: rgba(200,128,16,.3); }
[data-theme="light"] .g-var  { background: rgba(80,80,160,.1); color: #5050a0; border-color: rgba(80,80,160,.25); }

.chevron { font-size: 14px; color: var(--muted); transition: transform .3s cubic-bezier(.34,1.6,.64,1); }
.track-card.open .chevron { transform: rotate(180deg); color: var(--v1); }

/* LYRICS PANEL */
.lyrics-panel { display: none; border-top: 1px solid rgba(255,255,255,.1); padding: 0 20px; }
.track-card.open .lyrics-panel { display: block; animation: lyricsIn .3s ease both; }
@keyframes lyricsIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.lyrics-inner { padding: 20px 0 24px; }
.lyrics-txt {
  font-family: 'Outfit', sans-serif; font-size: 14px; line-height: 2; color: var(--text2);
  white-space: pre-wrap; letter-spacing: .01em;
}
.lyrics-txt .verse-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .22em; text-transform: uppercase; color: var(--muted); display: block; margin: 14px 0 4px; }
.lyrics-txt .chorus { color: var(--text); font-weight: 500; }
.lyrics-actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
.lbtn {
  padding: 8px 20px; border-radius: 14px; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all .2s; border: none;
}
.lbtn-copy { background: linear-gradient(135deg,var(--v1),var(--v2)); color: #fff; box-shadow: 0 4px 16px rgba(124,111,255,.35); }
.lbtn-copy:hover { filter: brightness(1.15); transform: translateY(-1px); }
.lbtn-edit {
  background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,.18);
  color: var(--text2);
}
.lbtn-edit:hover { border-color: var(--v3); color: var(--v3); background: rgba(94,231,255,.1); }
.empty-lyrics {
  font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); font-style: italic;
  text-align: center; padding: 24px 0;
}

/* EDIT TEXTAREA */
.lyrics-edit { display: none; }
.lyrics-edit.open { display: flex; flex-direction: column; gap: 10px; }
.lyrics-edit textarea {
  width: 100%; min-height: 180px; padding: 14px 16px;
  background: rgba(0,0,0,.2); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,.15); border-radius: 14px;
  color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.7;
  outline: none; resize: vertical; transition: border-color .2s;
}
.lyrics-edit textarea:focus { border-color: var(--v2); box-shadow: 0 0 0 3px rgba(212,124,255,.18); }
.edit-actions { display: flex; gap: 8px; }
.lbtn-save { background: linear-gradient(135deg,var(--v4),var(--v3)); color: #08080f; box-shadow: 0 4px 16px rgba(95,255,200,.3); }
.lbtn-save:hover { filter: brightness(1.1); transform: translateY(-1px); }
.lbtn-cancel { background: var(--glass); border: 1px solid rgba(255,255,255,.15); color: var(--muted); }
.lbtn-cancel:hover { border-color: var(--red); color: var(--red); }

/* NO RESULTS */
.no-res { text-align: center; padding: 64px 20px; color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 13px; }

/* FLOAT BTNS */
.float-btns { position: fixed; bottom: 28px; right: 28px; z-index: 500; display: flex; gap: 12px; }
.fbtn {
  width: 52px; height: 52px; border-radius: 50%; border: 1px solid rgba(255,255,255,.2);
  display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer;
  transition: transform .28s cubic-bezier(.34,1.6,.64,1), filter .2s;
  box-shadow: 0 8px 28px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.22);
  position: relative; overflow: hidden;
}
.fbtn::after {
  content: ''; position: absolute; top: 4px; left: 8px; right: 8px; height: 38%;
  border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
  background: linear-gradient(180deg, rgba(255,255,255,.35) 0%, transparent 100%);
  pointer-events: none;
}
.fbtn:hover { transform: scale(1.15) translateY(-3px); filter: brightness(1.15); }
.fbtn:active { transform: scale(.88); }
.fbtn-theme { background: linear-gradient(145deg,#7c6fff,#d47cff); color: #fff; }
.fbtn-add { background: linear-gradient(145deg,#5ee7ff,#5fffc8); color: #08080f; }
@keyframes pulseV { 0%,100%{box-shadow:0 0 0 0 rgba(124,111,255,.4),0 8px 28px rgba(124,111,255,.5)} 50%{box-shadow:0 0 0 8px rgba(124,111,255,0),0 8px 28px rgba(124,111,255,.7)} }
.fbtn-theme { animation: pulseV 3s ease-in-out infinite; }

/* ADD MODAL */
.modal-bg {
  display: none; position: fixed; inset: 0; z-index: 800;
  background: rgba(0,0,0,.55); backdrop-filter: blur(20px); align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: rgba(15,15,26,.8); backdrop-filter: blur(40px) saturate(2); -webkit-backdrop-filter: blur(40px) saturate(2);
  border: 1px solid rgba(255,255,255,.18); border-radius: 28px; padding: 32px;
  width: 580px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
  position: relative; animation: modalPop .4s cubic-bezier(.34,1.6,.64,1);
  box-shadow: 0 32px 96px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.12);
  display: flex; flex-direction: column; gap: 18px;
}
[data-theme="light"] .modal { background: rgba(255,255,255,.7); }
@keyframes modalPop { from{opacity:0;transform:scale(.82) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }
.modal-head { display: flex; align-items: center; justify-content: space-between; }
.modal-title {
  font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700;
  background: linear-gradient(135deg,var(--v1),var(--v2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.modal-x {
  width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15);
  color: var(--muted); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s;
}
.modal-x:hover { color: var(--text); background: rgba(255,107,107,.18); border-color: var(--red); }
.mfield { display: flex; flex-direction: column; gap: 6px; }
.mlbl { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); }
.mfield input, .mfield select, .mfield textarea {
  background: rgba(255,255,255,.07); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,.18); border-radius: 12px;
  color: var(--text); font-family: 'Outfit', sans-serif; font-size: 14px;
  padding: 11px 14px; outline: none; transition: all .2s; width: 100%;
}
.mfield input:focus, .mfield select:focus, .mfield textarea:focus { border-color: var(--v1); box-shadow: 0 0 0 3px rgba(124,111,255,.2); }
.mfield input::placeholder, .mfield textarea::placeholder { color: var(--muted); }
.mfield select { appearance: none; cursor: pointer; }
.mfield textarea { min-height: 140px; resize: vertical; font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.7; }
.mrow { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.mbtn-save { width: 100%; padding: 14px; background: linear-gradient(135deg,var(--v1),var(--v2)); border: none; border-radius: 16px; color: #fff; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; box-shadow: 0 6px 24px rgba(124,111,255,.4); }
.mbtn-save:hover { filter: brightness(1.15); box-shadow: 0 8px 32px rgba(124,111,255,.55); }

/* HIGHLIGHT */
mark { background: rgba(212,124,255,.3); color: var(--text); border-radius: 3px; padding: 0 2px; }
[data-theme="light"] mark { background: rgba(176,96,224,.25); }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div id="app">
  <div class="header">
    <div class="brand">🎵 Cosmic-Frequency</div>
    <div class="brand-sub">Bibliothèque de paroles · <span id="totalCount">0</span> pistes</div>
  </div>

  <div class="search-wrap">
    <span class="si">🔍</span>
    <input type="text" id="search" placeholder="Rechercher un titre, artiste, paroles…" oninput="doSearch()">
    <button class="sc" id="clearBtn" onclick="clearSearch()">✕</button>
  </div>

  <div class="filters">
    <button class="fpill active" onclick="setGenre('all',this)">Tous</button>
    <button class="fpill" onclick="setGenre('pop',this)">Pop</button>
    <button class="fpill" onclick="setGenre('rnb',this)">R&B</button>
    <button class="fpill" onclick="setGenre('rap',this)">Rap</button>
    <button class="fpill" onclick="setGenre('rock',this)">Rock</button>
    <button class="fpill" onclick="setGenre('elec',this)">Électro</button>
    <button class="fpill" onclick="setGenre('soul',this)">Soul</button>
    <button class="fpill" onclick="setGenre('var',this)">Variété</button>
  </div>

  <div class="count-bar">
    <span class="count-txt" id="countTxt">— pistes</span>
  </div>

  <div class="list" id="list"></div>
  <div class="no-res" id="noRes" style="display:none">🔍 Aucune piste trouvée</div>
</div>

<!-- FLOAT BTNS -->
<div class="float-btns">
  <button class="fbtn fbtn-add" onclick="openAdd()" title="Ajouter une piste">✚</button>
  <button class="fbtn fbtn-theme" onclick="toggleTheme()" id="themeBtn" title="Thème">🌙</button>
</div>

<!-- ADD MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">✨ Ajouter une piste</span>
      <button class="modal-x" onclick="closeAdd()">✕</button>
    </div>
    <div class="mrow">
      <div class="mfield">
        <div class="mlbl">Titre *</div>
        <input id="mf-title" type="text" placeholder="Nom de la chanson">
      </div>
      <div class="mfield">
        <div class="mlbl">Artiste *</div>
        <input id="mf-artist" type="text" placeholder="Artiste / Groupe">
      </div>
    </div>
    <div class="mrow">
      <div class="mfield">
        <div class="mlbl">Genre</div>
        <select id="mf-genre">
          <option value="var">Variété</option>
          <option value="pop">Pop</option>
          <option value="rnb">R&B</option>
          <option value="rap">Rap</option>
          <option value="rock">Rock</option>
          <option value="elec">Électro</option>
          <option value="soul">Soul</option>
        </select>
      </div>
      <div class="mfield">
        <div class="mlbl">Émoji</div>
        <input id="mf-emoji" type="text" placeholder="🎵" maxlength="4">
      </div>
    </div>
    <div class="mfield">
      <div class="mlbl">Paroles</div>
      <textarea id="mf-lyrics" placeholder="Colle ici les paroles…&#10;Tu peux utiliser [Couplet 1], [Refrain], etc."></textarea>
    </div>
    <button class="mbtn-save" onclick="saveTrack()">✅ Ajouter à la bibliothèque</button>
  </div>
</div>

<script>
// ═══════════════════ DONNÉES — 161 PISTES ═══════════════════
// Remplis les champs `lyrics` avec les vraies paroles.
// Format libre : utilise [Couplet 1], [Refrain], [Bridge], etc.
const TRACKS = [

  {id:13, emoji:"🎵", title:"Titre 013", artist:"Artiste 013", genre:"rock", lyrics:""},
  {id:14, emoji:"🎵", title:"Titre 014", artist:"Artiste 014", genre:"elec", lyrics:""},
  {id:15, emoji:"🎵", title:"Titre 015", artist:"Artiste 015", genre:"soul", lyrics:""},

// ══════════════ STATE ══════════════
let currentGenre = "all";
let currentQuery = "";

// ══════════════ THEME ══════════════
(function(){ const t=localStorage.getItem("cf-theme")||"dark"; document.documentElement.setAttribute("data-theme",t); })();
function toggleTheme(){
  const isDark=document.documentElement.getAttribute("data-theme")==="dark";
  document.documentElement.setAttribute("data-theme",isDark?"light":"dark");
  document.getElementById("themeBtn").textContent=isDark?"☀️":"🌙";
  localStorage.setItem("cf-theme",isDark?"light":"dark");
}

// ══════════════ FILTER ══════════════
function setGenre(g, el){
  currentGenre=g;
  document.querySelectorAll(".fpill").forEach(p=>p.classList.remove("active"));
  el.classList.add("active");
  renderList();
}
function doSearch(){
  currentQuery=document.getElementById("search").value.trim().toLowerCase();
  document.getElementById("clearBtn").style.display=currentQuery?"block":"none";
  renderList();
}
function clearSearch(){
  document.getElementById("search").value="";
  currentQuery="";
  document.getElementById("clearBtn").style.display="none";
  renderList();
}
function getFiltered(){
  return TRACKS.filter(t=>{
    const genreOk = currentGenre==="all"||t.genre===currentGenre;
    if(!currentQuery) return genreOk;
    const q=currentQuery;
    return genreOk && (
      t.title.toLowerCase().includes(q)||
      t.artist.toLowerCase().includes(q)||
      (t.lyrics&&t.lyrics.toLowerCase().includes(q))
    );
  });
}

// ══════════════ HIGHLIGHT ══════════════
function hl(str){
  if(!currentQuery||!str) return str||"";
  const re=new RegExp("("+currentQuery.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
  return str.replace(re,"<mark>$1</mark>");
}

// ══════════════ RENDER ══════════════
function renderList(){
  const data=getFiltered();
  const list=document.getElementById("list");
  const noRes=document.getElementById("noRes");
  document.getElementById("countTxt").textContent=data.length+" piste"+(data.length>1?"s":"");
  if(!data.length){ list.innerHTML=""; noRes.style.display="block"; return; }
  noRes.style.display="none";
  list.innerHTML=data.map((t,i)=>`
    <div class="track-card" id="card-${t.id}" style="animation-delay:${Math.min(i*.015,.3)}s">
      <div class="track-header" onclick="toggleCard(${t.id})">
        <span class="track-num">${String(t.id).padStart(3,"0")}</span>
        <span class="track-emoji">${t.emoji||"🎵"}</span>
        <div class="track-info">
          <div class="track-title">${hl(t.title)}</div>
          <div class="track-artist">${hl(t.artist)}</div>
        </div>
        <div class="track-meta">
          <span class="genre-tag g-${t.genre}">${genreLabel(t.genre)}</span>
          <span class="chevron">⌄</span>
        </div>
      </div>
      <div class="lyrics-panel">
        <div class="lyrics-inner">
          <div class="lyrics-txt" id="lt-${t.id}">${renderLyrics(t.lyrics)}</div>
          <div class="lyrics-edit" id="le-${t.id}">
            <textarea id="lta-${t.id}" placeholder="Colle les paroles ici…">${t.lyrics||""}</textarea>
            <div class="edit-actions">
              <button class="lbtn lbtn-save" onclick="saveLyrics(${t.id})">💾 Enregistrer</button>
              <button class="lbtn lbtn-cancel" onclick="cancelEdit(${t.id})">Annuler</button>
            </div>
          </div>
          <div class="lyrics-actions" id="la-${t.id}">
            ${t.lyrics?`<button class="lbtn lbtn-copy" onclick="copyLyrics(${t.id})">📋 Copier</button>`:""}
            <button class="lbtn lbtn-edit" onclick="startEdit(${t.id})">✏️ ${t.lyrics?"Modifier":"Ajouter paroles"}</button>
          </div>
        </div>
      </div>
    </div>`).join("");
}
function genreLabel(g){
  const m={pop:"Pop",rnb:"R&B",rap:"Rap",rock:"Rock",elec:"Électro",soul:"Soul",var:"Variété"};
  return m[g]||g;
}
function renderLyrics(txt){
  if(!txt) return '<div class="empty-lyrics">✨ Paroles non renseignées — clique sur « Ajouter paroles »</div>';
  const escaped=txt.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const formatted=escaped.replace(/\[(.*?)\]/g,'<span class="verse-label">[$1]</span>');
  const withChorus=formatted.replace(/(refrain|chorus|hook)/gi,m=>`<span class="chorus">${m}</span>`);
  if(currentQuery){
    const re=new RegExp("("+currentQuery.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
    return withChorus.replace(re,"<mark>$1</mark>");
  }
  return withChorus;
}

// ══════════════ CARD TOGGLE ══════════════
function toggleCard(id){
  const card=document.getElementById("card-"+id);
  const wasOpen=card.classList.contains("open");
  document.querySelectorAll(".track-card.open").forEach(c=>c.classList.remove("open"));
  if(!wasOpen) card.classList.add("open");
}

// ══════════════ EDIT LYRICS ══════════════
function startEdit(id){
  document.getElementById("lt-"+id).style.display="none";
  document.getElementById("la-"+id).style.display="none";
  document.getElementById("le-"+id).classList.add("open");
  document.getElementById("lta-"+id).focus();
}
function cancelEdit(id){
  document.getElementById("le-"+id).classList.remove("open");
  document.getElementById("lt-"+id).style.display="block";
  document.getElementById("la-"+id).style.display="flex";
}
function saveLyrics(id){
  const txt=document.getElementById("lta-"+id).value.trim();
  const t=TRACKS.find(x=>x.id===id); if(!t)return;
  t.lyrics=txt;
  document.getElementById("lt-"+id).innerHTML=renderLyrics(txt);
  document.getElementById("lt-"+id).style.display="block";
  document.getElementById("la-"+id).style.display="flex";
  document.getElementById("la-"+id).innerHTML=`
    ${txt?`<button class="lbtn lbtn-copy" onclick="copyLyrics(${id})">📋 Copier</button>`:""}
    <button class="lbtn lbtn-edit" onclick="startEdit(${id})">✏️ ${txt?"Modifier":"Ajouter paroles"}</button>`;
  document.getElementById("le-"+id).classList.remove("open");
}
function copyLyrics(id){
  const t=TRACKS.find(x=>x.id===id); if(!t||!t.lyrics)return;
  navigator.clipboard.writeText(t.title+"\n"+t.artist+"\n\n"+t.lyrics).then(()=>{
    const btn=event.target; const orig=btn.textContent;
    btn.textContent="✓ Copié !"; setTimeout(()=>btn.textContent=orig,2000);
  });
}

// ══════════════ ADD MODAL ══════════════
function openAdd(){ document.getElementById("modalBg").classList.add("open"); }
function closeAdd(){ document.getElementById("modalBg").classList.remove("open"); }
document.getElementById("modalBg").addEventListener("click",e=>{ if(e.target===document.getElementById("modalBg"))closeAdd(); });
function saveTrack(){
  const title=document.getElementById("mf-title").value.trim();
  const artist=document.getElementById("mf-artist").value.trim();
  if(!title||!artist){alert("⚠️ Titre et artiste sont requis.");return;}
  const genre=document.getElementById("mf-genre").value;
  const emoji=document.getElementById("mf-emoji").value.trim()||"🎵";
  const lyrics=document.getElementById("mf-lyrics").value.trim();
  const newId=Math.max(...TRACKS.map(t=>t.id))+1;
  TRACKS.push({id:newId,emoji,title,artist,genre,lyrics});
  document.getElementById("totalCount").textContent=TRACKS.length;
  closeAdd();
  ["mf-title","mf-artist","mf-emoji","mf-lyrics"].forEach(id=>document.getElementById(id).value="");
  renderList();
}

// ══════════════ INIT ══════════════
document.getElementById("totalCount").textContent=TRACKS.length;
renderList();
</script>
</body>
