<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Music - Style</title>
    <style>
        :root {
            --bg-color: #000000;
            --sidebar-bg: #161617;
            --card-bg: #1c1c1e;
            --text-main: #ffffff;
            --text-secondary: #8e8e93;
            --apple-red: #fa243c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 240px;
            background-color: var(--sidebar-bg);
            padding: 24px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2c2c2e;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .logo span { color: var(--apple-red); }

        .nav-item {
            display: flex;
            padding: 8px 12px;
            color: var(--text-main);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .nav-item.active { background-color: var(--apple-red); }

        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            padding-bottom: 120px;
        }

        .header h1 {
            font-size: 34px;
            margin-bottom: 30px;
        }

        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 24px;
        }

        .track-card {
            background-color: var(--card-bg);
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .track-card:hover { transform: translateY(-5px); }

        .cover-art {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, #3a3a3c, #1c1c1e);
            border-radius: 8px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .track-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 90px;
            background-color: rgba(22, 22, 23, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid #2c2c2e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }

        .player-info { display: flex; align-items: center; gap: 15px; width: 30%; }
        .player-mini-cover { width: 50px; height: 50px; background: #3a3a3c; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .player-controls { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 40%; }
        .control-buttons { display: flex; gap: 25px; }
        .ctrl-btn { background: none; border: none; color: var(--text-main); font-size: 18px; cursor: pointer; }
        .ctrl-btn.play-pause { width: 40px; height: 40px; background-color: var(--text-main); color: var(--bg-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        
        .progress-container { display: flex; align-items: center; gap: 10px; width: 100%; }
        .progress-bar-wrapper { flex: 1; height: 4px; background-color: #48484a; border-radius: 2px; position: relative; cursor: pointer; }
        .progress-bar { height: 100%; width: 0%; background-color: var(--text-main); border-radius: 2px; }
        .time-stamp { font-size: 11px; color: var(--text-secondary); width: 35px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo"><span></span> Music</div>
        <a href="#" class="nav-item active">Écouter</a>
        <a href="#" class="nav-item">Explorer</a>
    </div>

    <div class="main-content">
        <div class="header"><h1>Ma Playlist</h1></div>
        <div class="music-grid" id="musicGrid"></div>
    </div>

    <div class="player-bar">
        <div class="player-info">
            <div class="player-mini-cover" id="playerBg">🎵</div>
            <div>
                <div class="player-track-title" id="playerTitle">Aucun morceau</div>
                <div class="player-track-artist" id="playerArtist">Choisissez un titre</div>
            </div>
        </div>
        <div class="player-controls">
            <div class="control-buttons">
                <button class="ctrl-btn" onclick="prevTrack()">⏮</button>
                <button class="ctrl-btn play-pause" id="playBtn" onclick="togglePlay()">▶</button>
                <button class="ctrl-btn" onclick="nextTrack()">⏭</button>
            </div>
            <div class="progress-container">
                <span class="time-stamp" id="currentTime">0:00</span>
                <div class="progress-bar-wrapper" onclick="seek(event)">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <span class="time-stamp" id="duration">0:00</span>
            </div>
        </div>
        <div style="width: 30%;"></div>
    </div>

    <audio id="mainAudio" src=""></audio>

    <script>
        // Liste respectant EXACTEMENT tes inversions demandées
        const tracks = [
            { title: "San Francisco", artist: "Sound of Legend", url: "https://res.cloudinary.com/dmvoedoe6/video/upload/v1780316654/Unstoppable_-_Sia_jmbpxu.mp3" },
            { title: "One more time", artist: "Daft Punk", url: "https://res.cloudinary.com/dmvoedoe6/video/upload/v1780316653/San_Francisco_-_Sound_of_Legend_kompkd.mp3" },
            { title: "Don’t stop the music", artist: "Rihanna", url: "https://res.cloudinary.com/dmvoedoe6/video/upload/v1780316653/Espresso_-_Sabrina_Carpenter_t9qno1.mp3" },
            { title: "Espresso", artist: "Sabrina Carpenter", url: "https://res.cloudinary.com/dmvoedoe6/video/upload/v1780316653/Flowers_-_Miley_Cyrus_p8zgqd.mp3" },
            { title: "Gata Only", artist: "FloyyMenor ft Cros MJ", url: "https://res.cloudinary.com/dmvoedoe6/video/upload/v1780316653/One_More_Time_-_Daft_Punk_g3mbgh.mp3" },
            { title: "Flowers", artist: "Miley Cyrus", url: "https://res.cloudinary.com/dmvoedoe6/video/upload/v1780316653/Gata_Only_-_FloyyMenor_ft_Cris_MJ_mtkuwe.mp3" },
            { title: "Bellie Jean", artist: "Michael Jackson", url: "https://res.cloudinary.com/dmvoedoe6/video/upload/v1780316652/Cheri_Cheri_Lady_-_Moderne_Talking_hef8bo.mp3" },
            { title: "Cheri Cheri Mady", artist: "Moderne Talking", url: "https://res.cloudinary.com/dmvoedoe6/video/upload/v1780316652/Dont_t_stop_the_music_-_Rihanna_hc1sa1.mp3" },
            { title: "Ain’t your Mama", artist: "Jennifer Lopez", url: "https://res.cloudinary.com/dmvoedoe6/video/upload/v1780316652/Beggin_-_M%C3%A2neskin_bjcage.mp3" },
            { title: "Beggin", artist: "Mâneskin", url: "https://res.cloudinary.com/dmvoedoe6/video/upload/v1780316652/Billie_Jean_-_Micha%C3%ABl_Jackson_rej5a7.mp3" },
            { title: "Unstoppable", artist: "Sia", url: "https://res.cloudinary.com/dmvoedoe6/video/upload/v1780317428/Unstoppable_-_Sia_1_vjwicq.mp3" }
        ];

        let currentTrackIndex = 0;
        const audio = document.getElementById('mainAudio');
        const playBtn = document.getElementById('playBtn');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const playerTitle = document.getElementById('playerTitle');
        const playerArtist = document.getElementById('playerArtist');

        const musicGrid = document.getElementById('musicGrid');
        tracks.forEach((track, index) => {
            const card = document.createElement('div');
            card.className = 'track-card';
            card.onclick = () => loadAndPlayTrack(index);
            card.innerHTML = `
                <div class="cover-art">🎵</div>
                <div class="track-title">${track.title}</div>
                <div class="track-artist">${track.artist}</div>
            `;
            musicGrid.appendChild(card);
        });

        function loadAndPlayTrack(index) {
            currentTrackIndex = index;
            audio.src = tracks[index].url;
            playerTitle.innerText = tracks[index].title;
            playerArtist.innerText = tracks[index].artist;
            audio.play();
            playBtn.innerText = "⏸";
        }

        function togglePlay() {
            if(audio.src === "") { loadAndPlayTrack(0); return; }
            if(audio.paused) { audio.play(); playBtn.innerText = "⏸"; } 
            else { audio.pause(); playBtn.innerText = "▶"; }
        }

        function nextTrack() { loadAndPlayTrack((currentTrackIndex + 1) % tracks.length); }
        function prevTrack() { loadAndPlayTrack((currentTrackIndex - 1 + tracks.length) % tracks.length); }

        audio.ontimeupdate = function() {
            if(audio.duration) {
                progressBar.style.width = (audio.currentTime / audio.duration) * 100 + "%";
                let curMins = Math.floor(audio.currentTime / 60), curSecs = Math.floor(audio.currentTime % 60);
                let durMins = Math.floor(audio.duration / 60), durSecs = Math.floor(audio.duration % 60);
                currentTimeEl.innerText = curMins + ":" + (curSecs < 10 ? "0" : "") + curSecs;
                durationEl.innerText = durMins + ":" + (durSecs < 10 ? "0" : "") + durSecs;
            }
        };

        audio.onended = nextTrack;

        function seek(event) {
            const rect = event.currentTarget.getBoundingClientRect();
            if(audio.duration) audio.currentTime = ((event.clientX - rect.left) / rect.width) * audio.duration;
        }
    </script>
</body>
</html>
