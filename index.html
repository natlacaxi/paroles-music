<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Paroles — Cosmic-Frequency</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07070e;
  --c1: #7c3aed;
  --c2: #2563eb;
  --c3: #0891b2;
  --c4: #10b981;
  --c5: #f59e0b;
  --c6: #ef4444;
  --c7: #8b5cf6;
  --c8: #06b6d4;
  --text: #f0f0ff;
  --text2: #aaa8d0;
  --muted: #6060a0;
  --glass: rgba(255,255,255,0.06);
  --glass2: rgba(255,255,255,0.12);
  --border: rgba(255,255,255,0.13);
  --blur: blur(24px) saturate(2);
  --red: #ef4444;
  --radius: 20px;
}
[data-theme="light"] {
  --bg: #f0eeff;
  --text: #1a1030;
  --text2: #4a3880;
  --muted: #9080c0;
  --glass: rgba(255,255,255,0.55);
  --glass2: rgba(255,255,255,0.75);
  --border: rgba(100,80,200,0.2);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;font-size:18px;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .4s,color .4s}
#bgvid{position:fixed;inset:0;z-index:0;width:100%;height:100%;object-fit:cover;opacity:.18;pointer-events:none}
[data-theme="light"] #bgvid{opacity:.07}
.bg-overlay{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse at 20% 20%,rgba(124,58,237,.15) 0%,transparent 55%),radial-gradient(ellipse at 80% 70%,rgba(6,182,212,.15) 0%,transparent 55%),radial-gradient(ellipse at 50% 50%,rgba(16,185,129,.06) 0%,transparent 70%);animation:overlayPulse 8s ease-in-out infinite alternate}
@keyframes overlayPulse{0%{opacity:.6}50%{opacity:1}100%{opacity:.7}}
.grain{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
#app{position:relative;z-index:10;max-width:1000px;margin:0 auto;padding:56px 20px 140px}
.header{margin-bottom:32px;display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:space-between;gap:16px}
.brand{font-family:'Syne',sans-serif;font-size:clamp(40px,7vw,68px);font-weight:800;letter-spacing:-.04em;background:linear-gradient(135deg,var(--c7) 0%,var(--c8) 50%,var(--c4) 100%);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradShift 4s ease infinite;line-height:1.1}
.brand-pre{font-family:'Syne',sans-serif;font-size:clamp(14px,2.5vw,20px);font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.brand-sub{font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);margin-top:8px}
.header-btns{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.hbtn{padding:12px 22px;border-radius:50px;border:none;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .22s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;display:flex;align-items:center;gap:7px}
.hbtn-ext{background:linear-gradient(135deg,var(--c7),var(--c2));color:#fff;box-shadow:0 4px 20px rgba(124,58,237,.4)}
.hbtn-ext:hover{transform:translateY(-2px) scale(1.05);box-shadow:0 8px 30px rgba(124,58,237,.55)}
.hbtn-theme{background:var(--glass);backdrop-filter:var(--blur);border:1px solid var(--border);color:var(--text);width:44px;height:44px;border-radius:50%;padding:0;justify-content:center;font-size:18px}
.hbtn-theme:hover{background:var(--glass2);transform:scale(1.1) rotate(20deg)}
.search-wrap{position:relative;margin-bottom:18px}
.search-wrap input{width:100%;padding:19px 60px 19px 56px;background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1.5px solid var(--border);border-radius:18px;color:var(--text);font-family:'Outfit',sans-serif;font-size:18px;outline:none;transition:all .25s;box-shadow:0 4px 24px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.1)}
.search-wrap input:focus{border-color:var(--c7);background:rgba(124,58,237,.08);box-shadow:0 0 0 4px rgba(124,58,237,.15),0 8px 32px rgba(0,0,0,.25)}
.search-wrap input::placeholder{color:var(--muted)}
.si{position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none}
.sc{position:absolute;right:16px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;display:none;transition:color .15s}
.sc:hover{color:var(--red)}
.controls-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px}
.filters{display:flex;gap:7px;flex-wrap:wrap}
.fpill{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;padding:9px 20px;border-radius:50px;background:var(--glass);backdrop-filter:blur(12px);border:1.5px solid var(--border);color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap}
.fpill:hover{border-color:var(--c7);color:var(--c7);background:rgba(124,58,237,.1)}
.fpill.active{background:linear-gradient(135deg,rgba(124,58,237,.25),rgba(37,99,235,.2));border-color:var(--c7);color:var(--c7);box-shadow:0 0 0 3px rgba(124,58,237,.15),0 0 20px rgba(124,58,237,.2)}
.sort-wrap{display:flex;align-items:center;gap:8px}
.sort-btn{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;padding:9px 18px;border-radius:50px;background:var(--glass);backdrop-filter:blur(12px);border:1.5px solid var(--border);color:var(--text2);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.sort-btn:hover,.sort-btn.active{border-color:var(--c4);color:var(--c4);background:rgba(16,185,129,.1)}
.count-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.count-txt{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--muted);letter-spacing:.1em}
.list{display:flex;flex-direction:column;gap:8px}
.track-card{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s,box-shadow .2s,transform .2s;box-shadow:0 2px 16px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.07);animation:fadeIn .3s ease both;position:relative}
.track-card::before{content:'';position:absolute;inset:0;border-radius:var(--radius);background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,transparent 60%);pointer-events:none;z-index:1}
.track-card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);pointer-events:none;z-index:3}
.track-card:hover{box-shadow:0 6px 28px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.1);transform:translateY(-1px)}
.track-card.playing{border-color:var(--c4) !important;box-shadow:0 0 0 2px rgba(16,185,129,.2),0 8px 32px rgba(16,185,129,.18) !important;animation:playingGlow 2s ease-in-out infinite}
@keyframes playingGlow{0%,100%{box-shadow:0 0 0 2px rgba(16,185,129,.2),0 8px 32px rgba(16,185,129,.18)}50%{box-shadow:0 0 0 4px rgba(16,185,129,.35),0 12px 48px rgba(16,185,129,.3)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── ACCENT LINE — genre color per card ── */
.track-header{display:flex;align-items:center;gap:14px;padding:18px 22px;user-select:none;position:relative;z-index:2;border-left:3px solid transparent}
.track-card[data-genre="pop"] .track-header{border-left-color:#8b5cf6}
.track-card[data-genre="rnb"] .track-header{border-left-color:#a78bfa}
.track-card[data-genre="rap"] .track-header{border-left-color:#06b6d4}
.track-card[data-genre="rock"] .track-header{border-left-color:#ef4444}
.track-card[data-genre="elec"] .track-header{border-left-color:#10b981}
.track-card[data-genre="soul"] .track-header{border-left-color:#f59e0b}
.track-card[data-genre="var"] .track-header{border-left-color:#f97316}
.track-card[data-genre="techno"] .track-header{border-left-color:#64748b}
.track-card[data-genre="classique"] .track-header{border-left-color:#93c5fd}

.track-num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);width:30px;flex-shrink:0;text-align:right}
.track-emoji{font-size:28px;flex-shrink:0;transition:transform .3s cubic-bezier(.34,1.6,.64,1)}
.track-card:hover .track-emoji{transform:scale(1.15) rotate(-5deg)}
.track-info{flex:1;min-width:0;cursor:pointer}
.track-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-artist{font-size:14px;color:var(--text2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-meta{display:flex;align-items:center;gap:10px;flex-shrink:0}

/* GENRE TAGS */
.genre-tag{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.05em;padding:4px 12px;border-radius:50px;border:1px solid;backdrop-filter:blur(8px);white-space:nowrap}
.g-pop{background:rgba(139,92,246,.12);color:#8b5cf6;border-color:rgba(139,92,246,.4)}
.g-rnb{background:rgba(167,139,250,.12);color:#a78bfa;border-color:rgba(167,139,250,.4)}
.g-rap{background:rgba(6,182,212,.12);color:#06b6d4;border-color:rgba(6,182,212,.4)}
.g-rock{background:rgba(239,68,68,.12);color:#ef4444;border-color:rgba(239,68,68,.4)}
.g-elec{background:rgba(16,185,129,.12);color:#10b981;border-color:rgba(16,185,129,.4)}
.g-soul{background:rgba(245,158,11,.12);color:#f59e0b;border-color:rgba(245,158,11,.4)}
.g-var{background:rgba(249,115,22,.12);color:#f97316;border-color:rgba(249,115,22,.4)}
.g-techno{background:rgba(100,116,139,.12);color:#94a3b8;border-color:rgba(100,116,139,.4)}
.g-classique{background:rgba(147,197,253,.12);color:#93c5fd;border-color:rgba(147,197,253,.4)}

[data-theme="light"] .g-pop{background:rgba(109,40,217,.1);color:#6d28d9;border-color:rgba(109,40,217,.3)}
[data-theme="light"] .g-rnb{background:rgba(124,58,237,.1);color:#7c3aed;border-color:rgba(124,58,237,.3)}
[data-theme="light"] .g-rap{background:rgba(8,145,178,.1);color:#0891b2;border-color:rgba(8,145,178,.3)}
[data-theme="light"] .g-rock{background:rgba(185,28,28,.1);color:#b91c1c;border-color:rgba(185,28,28,.3)}
[data-theme="light"] .g-elec{background:rgba(4,120,87,.1);color:#047857;border-color:rgba(4,120,87,.3)}
[data-theme="light"] .g-soul{background:rgba(180,83,9,.1);color:#b45309;border-color:rgba(180,83,9,.3)}
[data-theme="light"] .g-var{background:rgba(194,65,12,.1);color:#c2410c;border-color:rgba(194,65,12,.3)}
[data-theme="light"] .g-techno{background:rgba(51,65,85,.1);color:#334155;border-color:rgba(51,65,85,.3)}
[data-theme="light"] .g-classique{background:rgba(30,64,175,.1);color:#1e40af;border-color:rgba(30,64,175,.3)}

/* PLAY BUTTON */
.play-btn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .22s cubic-bezier(.34,1.56,.64,1);background:linear-gradient(135deg,var(--c7),var(--c2));color:#fff;box-shadow:0 3px 14px rgba(124,58,237,.4);position:relative;overflow:hidden}
.play-btn::after{content:'';position:absolute;top:3px;left:7px;right:7px;height:40%;border-radius:50%;background:linear-gradient(180deg,rgba(255,255,255,.35),transparent);pointer-events:none}
.play-btn:hover{transform:scale(1.15);box-shadow:0 6px 22px rgba(124,58,237,.6)}
.play-btn:active{transform:scale(.9)}
.play-btn.is-playing{background:linear-gradient(135deg,var(--c4),var(--c8));box-shadow:0 3px 14px rgba(16,185,129,.5)}
.play-btn.no-audio{background:linear-gradient(135deg,#444,#222);box-shadow:none;opacity:.4;cursor:not-allowed}
.play-btn.no-audio:hover{transform:none}

.eq-bars{display:flex;align-items:flex-end;gap:2px;height:16px;flex-shrink:0}
.eq-bar{width:3px;border-radius:2px;background:var(--c4);animation:eqBounce .6s ease-in-out infinite alternate}
.eq-bar:nth-child(1){animation-delay:0s}
.eq-bar:nth-child(2){animation-delay:.15s}
.eq-bar:nth-child(3){animation-delay:.3s}
@keyframes eqBounce{from{height:4px}to{height:16px}}
.eq-bars.paused .eq-bar{animation-play-state:paused}
.chevron{font-size:13px;color:var(--muted);transition:transform .3s cubic-bezier(.34,1.6,.64,1);cursor:pointer}
.track-card.open .chevron{transform:rotate(180deg);color:var(--c7)}

/* LYRICS PANEL */
.lyrics-panel{display:none;border-top:1px solid rgba(255,255,255,.08);padding:0 18px}
.track-card.open .lyrics-panel{display:block;animation:lyricsIn .3s ease both}
@keyframes lyricsIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.lyrics-inner{padding:18px 0 22px}
.lyrics-txt{font-family:'Outfit',sans-serif;font-size:16px;line-height:2.1;color:var(--text2);white-space:pre-wrap;letter-spacing:.01em}
.lyrics-txt .verse-label{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);display:block;margin:14px 0 4px}
.lyrics-txt .chorus{color:var(--text);font-weight:500}
.lyrics-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.lbtn{padding:10px 22px;border-radius:12px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;border:none}
.lbtn-copy{background:linear-gradient(135deg,var(--c7),var(--c2));color:#fff;box-shadow:0 4px 14px rgba(124,58,237,.3)}
.lbtn-copy:hover{filter:brightness(1.15);transform:translateY(-1px)}
.lbtn-edit{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--border);color:var(--text2)}
.lbtn-edit:hover{border-color:var(--c4);color:var(--c4);background:rgba(16,185,129,.1)}
.empty-lyrics{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--muted);font-style:italic;text-align:center;padding:20px 0}
.lyrics-edit{display:none}
.lyrics-edit.open{display:flex;flex-direction:column;gap:10px}
.lyrics-edit textarea{width:100%;min-height:160px;padding:12px 14px;background:rgba(0,0,0,.25);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);border-radius:12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.7;outline:none;resize:vertical;transition:border-color .2s}
.lyrics-edit textarea:focus{border-color:var(--c7);box-shadow:0 0 0 3px rgba(124,58,237,.18)}
.edit-actions{display:flex;gap:8px}
.lbtn-save{background:linear-gradient(135deg,var(--c4),var(--c8));color:#07070e;box-shadow:0 4px 14px rgba(16,185,129,.3)}
.lbtn-save:hover{filter:brightness(1.1);transform:translateY(-1px)}
.lbtn-cancel{background:var(--glass);border:1px solid rgba(255,255,255,.15);color:var(--muted)}
.lbtn-cancel:hover{border-color:var(--red);color:var(--red)}

/* MINI PLAYER */
.mini-player{position:fixed;bottom:0;left:0;right:0;z-index:900;padding:12px 24px 20px;background:rgba(7,7,14,.7);backdrop-filter:blur(40px) saturate(2);-webkit-backdrop-filter:blur(40px) saturate(2);border-top:1px solid rgba(255,255,255,.1);display:none;box-shadow:0 -8px 40px rgba(0,0,0,.4)}
.mini-player.show{display:block;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mp-inner{max-width:1000px;margin:0 auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.mp-info{flex:1;min-width:160px}
.mp-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;background:linear-gradient(90deg,var(--c7),var(--c4));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mp-artist{font-size:13px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mp-controls{display:flex;align-items:center;gap:10px;flex-shrink:0}
.mp-btn{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .22s}
.mp-play{background:linear-gradient(135deg,var(--c7),var(--c2));color:#fff;box-shadow:0 3px 14px rgba(124,58,237,.45)}
.mp-play:hover{transform:scale(1.1)}
.mp-stop{background:var(--glass);border:1px solid var(--border);color:var(--text2)}
.mp-stop:hover{border-color:var(--red);color:var(--red)}
.mp-progress{flex:2;min-width:120px;display:flex;align-items:center;gap:8px}
.mp-time{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);white-space:nowrap}
.mp-bar{flex:1;height:4px;background:rgba(255,255,255,.12);border-radius:4px;overflow:hidden;cursor:pointer;position:relative}
.mp-bar-fill{height:100%;background:linear-gradient(90deg,var(--c7),var(--c4));border-radius:4px;width:0%;transition:width .3s linear}
.mp-vol{display:flex;align-items:center;gap:6px;flex-shrink:0}
.mp-vol-icon{font-size:14px;color:var(--muted)}
.mp-vol input{width:80px;accent-color:var(--c4);cursor:pointer}
.no-res{text-align:center;padding:60px 20px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:15px}

/* FABs */
.float-btns{position:fixed;bottom:90px;right:22px;z-index:500;display:flex;flex-direction:column;gap:10px}
.fbtn{width:50px;height:50px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:transform .28s cubic-bezier(.34,1.6,.64,1),filter .2s;box-shadow:0 6px 24px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.25);position:relative;overflow:hidden}
.fbtn::after{content:'';position:absolute;top:3px;left:7px;right:7px;height:38%;border-radius:50%;background:linear-gradient(180deg,rgba(255,255,255,.35),transparent);pointer-events:none}
.fbtn:hover{transform:scale(1.18) translateY(-3px);filter:brightness(1.15)}
.fbtn:active{transform:scale(.88)}
.fbtn-add{background:linear-gradient(145deg,var(--c4),var(--c8));color:#07070e;animation:addPulse 3s ease-in-out infinite}
.fbtn-theme{background:linear-gradient(145deg,var(--c7),var(--c2));color:#fff}
@keyframes addPulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.4),0 6px 24px rgba(16,185,129,.5)}50%{box-shadow:0 0 0 10px rgba(16,185,129,0),0 6px 24px rgba(16,185,129,.7)}}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.6);backdrop-filter:blur(20px);align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal{background:rgba(12,10,22,.82);backdrop-filter:blur(50px) saturate(2);-webkit-backdrop-filter:blur(50px) saturate(2);border:1.5px solid rgba(255,255,255,.15);border-radius:28px;padding:28px;width:560px;max-width:100%;max-height:90vh;overflow-y:auto;position:relative;animation:modalPop .4s cubic-bezier(.34,1.6,.64,1);box-shadow:0 32px 96px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.1);display:flex;flex-direction:column;gap:16px}
[data-theme="light"] .modal{background:rgba(240,235,255,.88)}
@keyframes modalPop{from{opacity:0;transform:scale(.82) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-head{display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;background:linear-gradient(135deg,var(--c7),var(--c4));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.modal-x{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-x:hover{color:var(--text);background:rgba(239,68,68,.18);border-color:var(--red)}
.mfield{display:flex;flex-direction:column;gap:6px}
.mlbl{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.mfield input,.mfield select,.mfield textarea{background:rgba(255,255,255,.06);backdrop-filter:blur(12px);border:1.5px solid rgba(255,255,255,.15);border-radius:12px;color:var(--text);font-family:'Outfit',sans-serif;font-size:16px;padding:13px 16px;outline:none;transition:all .2s;width:100%}
.mfield input:focus,.mfield select:focus,.mfield textarea:focus{border-color:var(--c7);box-shadow:0 0 0 3px rgba(124,58,237,.18)}
.mfield input::placeholder,.mfield textarea::placeholder{color:var(--muted)}
.mfield select{appearance:none;cursor:pointer}
.mfield textarea{min-height:130px;resize:vertical;font-family:'JetBrains Mono',monospace;font-size:14px;line-height:1.7}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mbtn-save{width:100%;padding:16px;background:linear-gradient(135deg,var(--c7),var(--c2));border:none;border-radius:16px;color:#fff;font-family:'Outfit',sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 6px 22px rgba(124,58,237,.4)}
.mbtn-save:hover{filter:brightness(1.15);transform:translateY(-1px)}
mark{background:rgba(124,58,237,.28);color:var(--text);border-radius:3px;padding:0 2px}
[data-theme="light"] mark{background:rgba(124,58,237,.2)}

@media(max-width:640px){
  #app{padding:36px 14px 180px}
  .brand{font-size:32px}
  .mrow{grid-template-columns:1fr}
  .mp-vol{display:none}
  .mp-progress{min-width:80px}
  .float-btns{bottom:130px;right:14px}
  .hbtn-ext span:last-child{display:none}
  .track-meta .genre-tag{display:none}
}
@media(max-width:400px){
  .mp-inner{gap:8px}
  .mp-play,.mp-stop{width:36px;height:36px;font-size:14px}
}
</style>
</head>

    <div class="header-btns">

      </button>
      <button class="hbtn hbtn-theme" onclick="toggleTheme()" id="themeBtn" title="Thème">🌙</button>
    </div>
  </div>

  <div class="search-wrap">
    <span class="si">🔍</span>
    <input type="text" id="search" placeholder="Rechercher un titre, artiste, paroles…" oninput="doSearch()">

  </div>
  <!-- CONTROLS -->
  <div class="controls-bar">
    <div class="filters">
      <button class="fpill active" onclick="setGenre('all',this)">Tous</button>
      <button class="fpill" onclick="setGenre('pop',this)">Pop</button>
      <button class="fpill" onclick="setGenre('rnb',this)">R&B</button>
      <button class="fpill" onclick="setGenre('rap',this)">Rap</button>
      <button class="fpill" onclick="setGenre('rock',this)">Rock</button>
      <button class="fpill" onclick="setGenre('elec',this)">Électro</button>
      <button class="fpill" onclick="setGenre('soul',this)">Soul</button>
      <button class="fpill" onclick="setGenre('var',this)">Variété</button>
      <button class="fpill" onclick="setGenre('classique',this)">Classique</button>
      <button class="fpill" onclick="setGenre('techno',this)">Techno</button>
    </div>
    <div class="sort-wrap">
      <button class="sort-btn active" id="sortAZ" onclick="setSort('az')">↑ A–Z</button>
      <button class="sort-btn" id="sortZA" onclick="setSort('za')">↓ Z–A</button>
    </div>
  </div>
  <div class="count-bar">
    <span class="count-txt" id="countTxt">— pistes</span>
  </div>
  <div class="list" id="list"></div>
  <div class="no-res" id="noRes" style="display:none">🔍 Aucune piste trouvée</div>
</div>

<!-- FABs -->
<div class="float-btns">
  <button class="fbtn fbtn-add" onclick="openAdd()" title="Ajouter une piste">✚</button>
  <button class="fbtn fbtn-theme" onclick="toggleTheme()" title="Thème">🌙</button>
</div>

<!-- MINI PLAYER -->
<div class="mini-player" id="miniPlayer">
  <div class="mp-inner">
    <div class="mp-info">
      <div class="mp-title" id="mpTitle">—</div>
      <div class="mp-artist" id="mpArtist">—</div>
    </div>
    <div class="mp-controls">
      <button class="mp-btn mp-stop" onclick="stopAudio()" title="Stop">⏹</button>
      <button class="mp-btn mp-play" onclick="togglePlayPause()" id="mpPlayBtn">⏸</button>
    </div>
    <div class="mp-progress">
      <span class="mp-time" id="mpCur">0:00</span>
      <div class="mp-bar" id="mpBar" onclick="seekAudio(event)">
        <div class="mp-bar-fill" id="mpFill"></div>
      </div>
      <span class="mp-time" id="mpDur">0:00</span>
    </div>
    <div class="mp-vol">
      <span class="mp-vol-icon">🔊</span>
      <input type="range" min="0" max="1" step="0.01" value="0.8" oninput="setVolume(this.value)">
    </div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-head">

    </div>
    <div class="mrow">

          <option value="rock">Rock</option>

          <option value="classique">Classique</option>
          <option value="techno">Techno</option>
        </select>
      </div>
      <div class="mfield"><div class="mlbl">Émoji</div><input id="mf-emoji" type="text" placeholder="🎵" maxlength="4"></div>
    </div>
    <div class="mfield"><div class="mlbl">URL Audio (mp3)</div><input id="mf-audio" type="text" placeholder="https://…"></div>
    <div class="mfield"><div class="mlbl">Paroles</div><textarea id="mf-lyrics" placeholder="Colle ici les paroles…"></textarea></div>
    <button class="mbtn-save" onclick="saveTrack()">✅ Ajouter à la bibliothèque</button>
  </div>
</div>

  { emoji:"👑", title:"Yeah", artist:"Usher ft. Lil Jon & Ludacris", genre:"rnb", audio:"https://res.cloudinary.com/dmvoedoe6/video/upload/v1778483853/Yeah_-_Usher_lrfcrb.mp3", lyrics:"" },

  { emoji:"🔊", title:"Bigroom-edm", artist:"Inconnu", genre:"techno", audio:"https://res.cloudinary.com/dmvoedoe6/video/upload/v1778483816/Bigroom-edm_ef922a.mp3", lyrics:"" },
];

// Sort A-Z and assign IDs
const TRACKS = [...TRACKS_RAW]
  .sort((a,b) => a.title.localeCompare(b.title, 'fr', {sensitivity:'base'}))
  .map((t,i) => ({...t, id: i+1}));

// ══════════ STATE ══════════
let currentGenre = "all";
let currentQuery = "";
let sortOrder = "az";
let currentAudio = null;
let currentTrackId = null;

// ══════════ THEME ══════════
(function(){
  const t = localStorage.getItem("cf-theme") || "dark";
  document.documentElement.setAttribute("data-theme", t);
  document.querySelectorAll('#themeBtn,.fbtn-theme').forEach(b => b.textContent = t==="dark"?"🌙":"☀️");
})();
function toggleTheme(){
  const isDark = document.documentElement.getAttribute("data-theme")==="dark";
  const newT = isDark?"light":"dark";
  document.documentElement.setAttribute("data-theme", newT);
  document.querySelectorAll('#themeBtn,.fbtn-theme').forEach(b => b.textContent = newT==="dark"?"🌙":"☀️");
  localStorage.setItem("cf-theme", newT);
}

// ══════════ FILTER & SORT ══════════
function setGenre(g,el){
  currentGenre = g;
  document.querySelectorAll(".fpill").forEach(p=>p.classList.remove("active"));
  el.classList.add("active");
  renderList();
}
function setSort(s){
  sortOrder = s;
  document.getElementById("sortAZ").classList.toggle("active", s==="az");
  document.getElementById("sortZA").classList.toggle("active", s==="za");
  renderList();
}
function doSearch(){
  currentQuery = document.getElementById("search").value.trim().toLowerCase();
  document.getElementById("clearBtn").style.display = currentQuery?"block":"none";
  renderList();
}
function clearSearch(){
  document.getElementById("search").value="";
  currentQuery="";
  document.getElementById("clearBtn").style.display="none";
  renderList();
}
function getFiltered(){
  let data = TRACKS.filter(t=>{
    const genreOk = currentGenre==="all" || t.genre===currentGenre;
    if(!currentQuery) return genreOk;
    return genreOk && (
      t.title.toLowerCase().includes(currentQuery) ||
      t.artist.toLowerCase().includes(currentQuery) ||
      (t.lyrics && t.lyrics.toLowerCase().includes(currentQuery))
    );
  });
  data = [...data].sort((a,b)=>{
    const cmp = a.title.localeCompare(b.title,'fr',{sensitivity:'base'});
    return sortOrder==="az"?cmp:-cmp;
  });
  return data;
}

// ══════════ HIGHLIGHT ══════════
function hl(str){
  if(!currentQuery||!str) return str||"";
  const re = new RegExp("("+currentQuery.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
  return str.replace(re,"<mark>$1</mark>");
}

// ══════════ RENDER ══════════
function genreLabel(g){
  const m={pop:"Pop",rnb:"R&B",rap:"Rap",rock:"Rock",elec:"Électro",soul:"Soul",var:"Variété",classique:"Classique",techno:"Techno"};
  return m[g]||g;
}
function renderLyrics(txt){
  if(!txt) return '<div class="empty-lyrics">✨ Paroles non renseignées — clique sur « Ajouter paroles »</div>';
  const escaped = txt.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const formatted = escaped.replace(/\[(.*?)\]/g,'<span class="verse-label">[$1]</span>');
  const withChorus = formatted.replace(/(refrain|chorus|hook)/gi,m=>`<span class="chorus">${m}</span>`);
  if(currentQuery){
    const re = new RegExp("("+currentQuery.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
    return withChorus.replace(re,"<mark>$1</mark>");
  }
  return withChorus;
}
function renderList(){
  const data = getFiltered();
  const list = document.getElementById("list");
  const noRes = document.getElementById("noRes");
  document.getElementById("countTxt").textContent = data.length+" piste"+(data.length>1?"s":"");
  if(!data.length){list.innerHTML="";noRes.style.display="block";return;}
  noRes.style.display="none";
  list.innerHTML = data.map((t,i)=>{
    const isPlaying = currentTrackId===t.id;
    const hasAudio = !!t.audio;
    return `
<div class="track-card${isPlaying?' playing':''}" id="card-${t.id}" data-genre="${t.genre}" style="animation-delay:${Math.min(i*.012,.25)}s">
  <div class="track-header">
    <span class="track-num">${String(t.id).padStart(3,"0")}</span>
    <span class="track-emoji">${t.emoji||"🎵"}</span>
    <div class="track-info" onclick="toggleCard(${t.id})">
      <div class="track-title">${hl(t.title)}</div>
      <div class="track-artist">${hl(t.artist)}</div>
    </div>
    <div class="track-meta">
      ${isPlaying?`<div class="eq-bars"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>`:''}
      <span class="genre-tag g-${t.genre}">${genreLabel(t.genre)}</span>
      <button class="play-btn${isPlaying?' is-playing':''}${!hasAudio?' no-audio':''}"
        onclick="playTrack(${t.id})"
        title="${hasAudio?(isPlaying?'En lecture':'Lire'):'Pas d\'audio'}"
      >${isPlaying?'⏸':'▶'}</button>
      <span class="chevron" onclick="toggleCard(${t.id})">⌄</span>
    </div>
  </div>
  <div class="lyrics-panel">
    <div class="lyrics-inner">
      <div class="lyrics-txt" id="lt-${t.id}">${renderLyrics(t.lyrics)}</div>
      <div class="lyrics-edit" id="le-${t.id}">
        <textarea id="lta-${t.id}" placeholder="Colle les paroles ici…">${t.lyrics||""}</textarea>
        <div class="edit-actions">
          <button class="lbtn lbtn-save" onclick="saveLyrics(${t.id})">💾 Enregistrer</button>
          <button class="lbtn lbtn-cancel" onclick="cancelEdit(${t.id})">Annuler</button>
        </div>
      </div>
      <div class="lyrics-actions" id="la-${t.id}">
        ${t.lyrics?`<button class="lbtn lbtn-copy" onclick="copyLyrics(${t.id})">📋 Copier</button>`:""}
        <button class="lbtn lbtn-edit" onclick="startEdit(${t.id})">✏️ ${t.lyrics?"Modifier":"Ajouter paroles"}</button>
      </div>
    </div>
  </div>
</div>`;
  }).join("");
}

// ══════════ CARD TOGGLE ══════════
function toggleCard(id){
  const card = document.getElementById("card-"+id);
  const wasOpen = card.classList.contains("open");
  document.querySelectorAll(".track-card.open").forEach(c=>c.classList.remove("open"));
  if(!wasOpen) card.classList.add("open");
}

// ══════════ AUDIO PLAYER ══════════
function fmtTime(s){
  if(isNaN(s)) return "0:00";
  const m=Math.floor(s/60),ss=Math.floor(s%60);
  return m+":"+(ss<10?"0":"")+ss;
}
function playTrack(id){
  const t = TRACKS.find(x=>x.id===id);
  if(!t||!t.audio) return;
  if(currentTrackId===id){
    if(currentAudio.paused){currentAudio.play();updateMPBtn(false);}
    else{currentAudio.pause();updateMPBtn(true);}
    renderList();
    return;
  }
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  currentTrackId=id;
  currentAudio=new Audio(t.audio);
  currentAudio.volume=document.querySelector('.mp-vol input')?parseFloat(document.querySelector('.mp-vol input').value):0.8;
  currentAudio.play().catch(()=>{});
  document.getElementById("mpTitle").textContent=t.title;
  document.getElementById("mpArtist").textContent=t.artist;
  document.getElementById("miniPlayer").classList.add("show");
  updateMPBtn(false);
  currentAudio.addEventListener("timeupdate",()=>{
    const cur=currentAudio.currentTime,dur=currentAudio.duration||0;
    document.getElementById("mpCur").textContent=fmtTime(cur);
    document.getElementById("mpDur").textContent=fmtTime(dur);
    document.getElementById("mpFill").style.width=(dur>0?(cur/dur)*100:0)+"%";
  });
  currentAudio.addEventListener("ended",()=>{
    currentTrackId=null;currentAudio=null;
    document.getElementById("miniPlayer").classList.remove("show");
    renderList();
  });
  renderList();
}
function updateMPBtn(paused){
  document.getElementById("mpPlayBtn").textContent=paused?"▶":"⏸";
}
function togglePlayPause(){
  if(!currentAudio) return;
  if(currentAudio.paused){currentAudio.play();updateMPBtn(false);}
  else{currentAudio.pause();updateMPBtn(true);}
  renderList();
}
function stopAudio(){
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  currentTrackId=null;
  document.getElementById("miniPlayer").classList.remove("show");
  renderList();
}
function seekAudio(e){
  if(!currentAudio||!currentAudio.duration) return;
  const bar=document.getElementById("mpBar");
  const rect=bar.getBoundingClientRect();
  const ratio=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
  currentAudio.currentTime=ratio*currentAudio.duration;
}
function setVolume(v){if(currentAudio) currentAudio.volume=parseFloat(v);}

// ══════════ EDIT LYRICS ══════════
function startEdit(id){
  document.getElementById("lt-"+id).style.display="none";
  document.getElementById("la-"+id).style.display="none";
  document.getElementById("le-"+id).classList.add("open");
  document.getElementById("lta-"+id).focus();
}
function cancelEdit(id){
  document.getElementById("le-"+id).classList.remove("open");
  document.getElementById("lt-"+id).style.display="block";
  document.getElementById("la-"+id).style.display="flex";
}
function saveLyrics(id){
  const txt=document.getElementById("lta-"+id).value.trim();
  const t=TRACKS.find(x=>x.id===id);
  if(!t) return;
  t.lyrics=txt;
  document.getElementById("lt-"+id).innerHTML=renderLyrics(txt);
  document.getElementById("lt-"+id).style.display="block";
  document.getElementById("la-"+id).style.display="flex";
  document.getElementById("la-"+id).innerHTML=`
    ${txt?`<button class="lbtn lbtn-copy" onclick="copyLyrics(${id})">📋 Copier</button>`:""}
    <button class="lbtn lbtn-edit" onclick="startEdit(${id})">✏️ ${txt?"Modifier":"Ajouter paroles"}</button>`;
  document.getElementById("le-"+id).classList.remove("open");
}
function copyLyrics(id){
  const t=TRACKS.find(x=>x.id===id);
  if(!t||!t.lyrics) return;
  navigator.clipboard.writeText(t.title+"\n"+t.artist+"\n\n"+t.lyrics).then(()=>{
    const btn=event.target;
    const orig=btn.textContent;
    btn.textContent="✓ Copié !";
    setTimeout(()=>btn.textContent=orig,2000);
  });
}

// ══════════ ADD MODAL ══════════
function openAdd(){document.getElementById("modalBg").classList.add("open");}
function closeAdd(){document.getElementById("modalBg").classList.remove("open");}
document.getElementById("modalBg").addEventListener("click",e=>{
  if(e.target===document.getElementById("modalBg")) closeAdd();
});
function saveTrack(){
  const title=document.getElementById("mf-title").value.trim();
  const artist=document.getElementById("mf-artist").value.trim();
  if(!title||!artist){alert("⚠️ Titre et artiste sont requis.");return;}
  const genre=document.getElementById("mf-genre").value;
  const emoji=document.getElementById("mf-emoji").value.trim()||"🎵";
  const lyrics=document.getElementById("mf-lyrics").value.trim();
  const audio=document.getElementById("mf-audio").value.trim();
  const newId=Math.max(...TRACKS.map(t=>t.id))+1;
  TRACKS.push({id:newId,emoji,title,artist,genre,lyrics,audio});
  // re-sort and reassign ids
  TRACKS.sort((a,b)=>a.title.localeCompare(b.title,'fr',{sensitivity:'base'}));
  TRACKS.forEach((t,i)=>t.id=i+1);
  document.getElementById("totalCount").textContent=TRACKS.length;
  closeAdd();
  ["mf-title","mf-artist","mf-emoji","mf-lyrics","mf-audio"].forEach(id=>document.getElementById(id).value="");
  renderList();
}

// ══════════ INIT ══════════
document.getElementById("totalCount").textContent = TRACKS.length;
renderList();
</script>
